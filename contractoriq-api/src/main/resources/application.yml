server:
  port: 8080

spring:
  application:
    name: contractoriq-api
  datasource:
    url: jdbc:postgresql://localhost:5432/contractoriq
    username: contractoriq
    password: contractoriq
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: contractoriq-score-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.contractoriq.dto,com.contractoriq.kafka
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

vision:
  service:
    url: http://localhost:8001
    timeout-ms: 30000

contractoriq:
  kafka:
    topic:
      score-recalculation: score-recalculation-events
  cache:
    score-ttl-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: contractoriq-api

logging:
  level:
    com.contractoriq: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{32} - %msg%n"
