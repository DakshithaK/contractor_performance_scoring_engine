name: Feature request
description: Propose a new capability or change in behavior
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's awkward today? Who feels the pain?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: How would it work? Endpoints, UI, data model.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you weigh, and why was it worse?
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Anything you're explicitly *not* proposing here.
