name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  spring-boot:
    name: Spring Boot · test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven verify (test + jacoco)
        working-directory: contractoriq-api
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: contractoriq-api/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: contractoriq-api/target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

      - name: Coverage summary
        if: always()
        run: |
          REPORT=contractoriq-api/target/site/jacoco/jacoco.csv
          if [ -f "$REPORT" ]; then
            awk -F, 'NR>1 { miss += $4; covered += $5 } END {
              total = miss + covered
              if (total > 0) printf "Line coverage: %.1f%% (%d/%d)\n", covered*100/total, covered, total
            }' "$REPORT" >> $GITHUB_STEP_SUMMARY
          fi

  vision-service:
    name: Vision service · lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: vision-service/requirements.txt

      - name: Install dependencies
        working-directory: vision-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        working-directory: vision-service
        run: ruff check . || true   # advisory until baseline is clean

      - name: Import smoke test
        working-directory: vision-service
        run: |
          python -c "import main; import services.vision_analyzer; import services.recommendation; print('imports ok')"

  frontend:
    name: Frontend · install + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Vite build
        working-directory: frontend
        run: npm run build

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  docker-build:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [spring-boot, vision-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build contractoriq-api image
        uses: docker/build-push-action@v5
        with:
          context: contractoriq-api
          push: false
          tags: contractoriq/contractoriq-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build vision-service image
        uses: docker/build-push-action@v5
        with:
          context: vision-service
          push: false
          tags: contractoriq/vision-service:ci
          cache-from: type=gha,scope=vision
          cache-to: type=gha,scope=vision,mode=max

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
