apiVersion: apps/v1
kind: Deployment
metadata:
  name: contractoriq-api
  labels:
    app: contractoriq-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contractoriq-api
  template:
    metadata:
      labels:
        app: contractoriq-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: contractoriq-api
          image: contractoriq/contractoriq-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/contractoriq
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: db-creds, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: db-creds, key: password } }
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: VISION_SERVICE_URL
              value: http://vision-service:8001
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1024Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: contractoriq-api
spec:
  selector:
    app: contractoriq-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
