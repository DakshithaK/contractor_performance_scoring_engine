global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: contractoriq-local
    env: dev

scrape_configs:
  - job_name: contractoriq-api
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["contractoriq-api:8080"]
        labels:
          service: contractoriq-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
