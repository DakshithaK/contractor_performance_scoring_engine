apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-service
  labels:
    app: vision-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-service
  template:
    metadata:
      labels:
        app: vision-service
    spec:
      containers:
        - name: vision-service
          image: contractoriq/vision-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: anthropic-creds, key: api-key } }
            - name: VISION_MODEL
              value: claude-opus-4-6
            - name: RECOMMENDATION_MODEL
              value: claude-haiku-4-5-20251001
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: vision-service
spec:
  selector:
    app: vision-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
