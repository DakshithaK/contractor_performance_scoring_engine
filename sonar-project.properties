sonar.projectKey=contractoriq
sonar.projectName=ContractorIQ
sonar.projectVersion=0.1.0

sonar.sources=contractoriq-api/src/main
sonar.tests=contractoriq-api/src/test
sonar.java.binaries=contractoriq-api/target/classes
sonar.java.source=17
sonar.sourceEncoding=UTF-8

# Exclude generated and seed-only code from coverage reports.
sonar.coverage.exclusions=\
  contractoriq-api/src/main/java/com/contractoriq/ContractorIqApplication.java,\
  contractoriq-api/src/main/java/com/contractoriq/DataSeeder.java,\
  contractoriq-api/src/main/java/com/contractoriq/config/**,\
  contractoriq-api/src/main/java/com/contractoriq/dto/**,\
  contractoriq-api/src/main/java/com/contractoriq/models/**

# Plug JaCoCo report in when sonar-scanner runs from CI.
sonar.coverage.jacoco.xmlReportPaths=contractoriq-api/target/site/jacoco/jacoco.xml
